animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,   0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0, 0.35, 1
    bezier = linear,         0,    0, 1,    1

    animation = border, 1, 5.39, easeOutQuint

    animation = windowsIn,   1, 3, easeOutQuint, slide
    animation = windowsOut,  1, 5, easeOutQuint, slide
    animation = windowsMove, 1, 2, easeOutQuint

    animation = fadeIn,  1, 1.75, linear
    animation = fadeOut, 1, 1.5,  linear
    animation = fade,    1, 3,    linear

    animation = layers, 1, 3.81, easeOutQuint, fade

    animation = fadeLayersIn,  1, 1.79, linear
    animation = fadeLayersOut, 1, 1.39, linear

    # animation = workspacesIn,  1, 3, easeOutQuint, slide
    # animation = workspacesOut, 1, 3, easeOutQuint, slide
    # animation = specialWorkspaceIn, 1, 3, easeOutQuint, slidevert
    # animation = specialWorkspaceOut, 1, 3, easeOutQuint, slidevert
    animation = workspaces, 1, 3, easeOutQuint, slide
    animation = specialWorkspace, 1, 3, easeOutQuint, slidevert
}
